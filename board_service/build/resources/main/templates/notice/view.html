<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      th:replace="~{layout/layout_main :: layout(~{::title}, ~{::main})}">
<head>
    <title th:text="${notice.title}">공지사항 상세</title>
</head>
<body>
<main>
    <div class="card">
        <div class="card-header">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <span th:if="${notice.noticeType == 'FAQ'}" class="badge badge-info mr-2">FAQ</span>
                    <span th:if="${notice.importance == 1}" class="badge badge-warning mr-2">중요</span>
                    <strong th:text="${notice.title}"></strong>
                </div>
                <small class="text-muted">
                    조회수: <span th:text="${notice.viewCount}"></span>
                    &nbsp;|&nbsp; 작성일: <span th:text="${notice.createdAt}"></span>
                </small>
            </div>
        </div>
        <div class="card-body">
            <p th:text="${notice.content}" style="white-space: pre-wrap; min-height: 200px;"></p>
        </div>
        <div class="card-footer d-flex justify-content-between">
            <a th:href="@{/board-service/notice/list}" class="btn btn-secondary">목록</a>
            <button type="button" class="btn btn-danger"
                    sec:authorize="hasRole('ADMIN')"
                    th:onclick="'deleteNotice(' + ${notice.noticeId} + ')'">삭제</button>
        </div>
    </div>

    <script>
    function deleteNotice(noticeId) {
        if (!confirm('삭제하시겠습니까?')) return;
        const token = localStorage.getItem('accessToken');
        fetch('/board-service/notice/delete?noticeId=' + noticeId, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(res => res.json())
        .then(result => {
            if (result === 1) {
                alert('삭제되었습니다.');
                window.location.href = '/board-service/notice/list';
            } else {
                alert('삭제 실패');
            }
        });
    }
    </script>
</main>
</body>
</html>
