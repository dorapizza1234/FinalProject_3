<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<body>
<nav th:fragment="header" class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <a class="navbar-brand" th:href="@{/board-service/index}">Board Service</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/board-service/notice/list}">공지사항/FAQ</a>
            </li>
            <li class="nav-item" sec:authorize="isAuthenticated()">
                <a class="nav-link" th:href="@{/board-service/inquiry/list}">1:1 문의</a>
            </li>
            <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                <a class="nav-link" th:href="@{/board-service/inquiry/admin/list}">문의관리(관리자)</a>
            </li>
        </ul>
        <ul class="navbar-nav ml-auto">
            <li class="nav-item" sec:authorize="isAuthenticated()">
                <span class="nav-link text-light">
                    <sec:authentication property="principal.username"/> 님
                </span>
            </li>
            <li class="nav-item" sec:authorize="isAuthenticated()">
                <a class="nav-link" href="#" id="logoutBtn">로그아웃</a>
            </li>
            <li class="nav-item" sec:authorize="!isAuthenticated()">
                <span class="nav-link text-secondary">로그인이 필요합니다</span>
            </li>
        </ul>
    </div>
</nav>

<script>
document.getElementById('logoutBtn') && document.getElementById('logoutBtn').addEventListener('click', function(e) {
    e.preventDefault();
    localStorage.removeItem('accessToken');
    localStorage.removeItem('refreshToken');
    fetch('/board-service/auth/logout', { method: 'POST' })
        .finally(() => { window.location.href = '/board-service/index'; });
});

// JWT 토큰을 요청 헤더에 자동으로 첨부하는 fetch 래퍼
window.authFetch = function(url, options = {}) {
    const token = localStorage.getItem('accessToken');
    if (token) {
        options.headers = options.headers || {};
        options.headers['Authorization'] = 'Bearer ' + token;
    }
    return fetch(url, options);
};

// 페이지 로드 시 토큰을 헤더에 설정하는 Ajax 기본 설정 (jQuery)
$(document).ready(function() {
    const token = localStorage.getItem('accessToken');
    if (token) {
        $.ajaxSetup({
            beforeSend: function(xhr) {
                xhr.setRequestHeader('Authorization', 'Bearer ' + token);
            }
        });
    }
});
</script>
</body>
</html>
