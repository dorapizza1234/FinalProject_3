<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">Board Service</title>
    <link rel="stylesheet" th:href="@{/bootstrap-4.6.2-dist/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { padding-top: 56px; }
        .footer { background-color: #f8f9fa; padding: 20px 0; margin-top: 40px; }
    </style>
</head>
<body>
    <div th:replace="~{fragment/header :: header}"></div>

    <main class="container mt-4">
        <div th:replace="${content}"></div>
    </main>

    <div th:replace="~{fragment/footer :: footer}"></div>

    <script th:src="@{/bootstrap-4.6.2-dist/js/jquery-3.5.1.min.js}"></script>
    <script th:src="@{/bootstrap-4.6.2-dist/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
