<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      th:replace="~{layout/layout_main :: layout(~{::title}, ~{::main})}">
<head>
    <title>문의 관리 (관리자)</title>
</head>
<body>
<main>
    <h3 class="mb-4">전체 문의 목록 (관리자)</h3>

    <table class="table table-hover table-bordered">
        <thead class="thead-dark">
            <tr>
                <th style="width:60px;">번호</th>
                <th>제목</th>
                <th style="width:160px;">문의자</th>
                <th style="width:100px;">상태</th>
                <th style="width:120px;">작성일</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(inquiryList)}">
                <td colspan="5" class="text-center text-muted">등록된 문의가 없습니다.</td>
            </tr>
            <tr th:each="inquiry, stat : ${inquiryList}">
                <td th:text="${stat.index + 1}"></td>
                <td>
                    <a th:href="@{/board-service/inquiry/view(inquiryId=${inquiry.inquiryId})}"
                       th:text="${inquiry.title}" class="text-dark"></a>
                </td>
                <td th:text="${inquiry.memberEmail}"></td>
                <td>
                    <span th:text="${inquiry.inquiryStatus}"
                          th:class="${inquiry.inquiryStatus == '답변완료'} ? 'badge badge-success' : 'badge badge-secondary'">
                    </span>
                </td>
                <td th:text="${inquiry.createdAt}"></td>
            </tr>
        </tbody>
    </table>
</main>
</body>
</html>
