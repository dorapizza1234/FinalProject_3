<div th:fragment="main_header"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

  <header class="site-header">
    <div class="promo-banner" role="banner">
      <div class="promo-inner">
        <p class="promo-text">
          카페 1900만 고객이 판매하는 하루 10만개의 상품을 편리하게 검색해보세요
        </p>
      </div>
    </div>

    <div class="header-main">
      <div class="header-inner">
        <a class="logo" th:href="@{/finalProject_3/}">
          <img th:src="@{/finalProject_3/images/logo.png}" alt="logo">
        </a>

        <nav class="util" aria-label="유틸 메뉴">
          <th:block sec:authorize="isAnonymous()">
            <a class="util-link" th:href="@{/finalProject_3/security/login}">
              로그인/회원가입
            </a>
          </th:block>

          <th:block sec:authorize="isAuthenticated()">
            <a class="util-link" id="headerLogoutBtn" href="#">로그아웃</a>
            <span class="util-sep" aria-hidden="true">|</span>
            <a class="util-link" th:href="@{/finalProject_3/mypage/main}">
              <button type="button" class="not-btn">
                <i class="fa-solid fa-circle-user"></i>
              </button>
            </a>
          </th:block>
        </nav>
      </div>

      <div class="nav-wrap">
        <div class="nav-inner">
          <nav class="gnb" aria-label="주요 메뉴">
            <a th:href="@{/finalProject_3/product/product_list}" class="gnb-link">장터</a>
            <a th:href="@{/finalProject_3/product/price_check}" class="gnb-link">시세조회</a>
            <a th:href="@{/finalProject_3/product/sell}" class="gnb-link">판매하기</a>
            <a th:href="@{/board-service/notice/list}" class="gnb-link">공지사항/FAQ</a>
            <a th:href="@{/board-service/inquiry/list}" class="gnb-link" sec:authorize="isAuthenticated()">1:1 문의</a>
          </nav>
        </div>
      </div>
    </div>
  </header>

  <script>
  document.getElementById('headerLogoutBtn') && document.getElementById('headerLogoutBtn').addEventListener('click', function(e) {
    e.preventDefault();
    fetch('/board-service/auth/logout', { method: 'POST' })
      .finally(() => { window.location.href = '/finalProject_3/security/login'; });
  });
  </script>
</div>
