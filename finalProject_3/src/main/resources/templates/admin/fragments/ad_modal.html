<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="adModal">

<div class="modal fade" id="adDetailModal" tabindex="-1">
<div class="modal-dialog modal-xl">
<div class="modal-content">

<!-- 헤더 -->
<div class="modal-header">
<h5 class="modal-title">광고 상세</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>


<div class="modal-body">

<div class="row">

<!-- 왼쪽 영역 -->
<div class="col-md-6">

<p><b>브랜드</b> : <span id="brandName"></span></p>
<p><b>담당자</b> : <span id="managerName"></span></p>
<p><b>전화</b> : <span id="phone"></span></p>

<hr>

<p><b>광고내용</b></p>
<p id="content"></p>

<img id="adImage" class="img-fluid mb-2" style="max-height:300px;">

<br>

<a id="downloadBtn" class="btn btn-sm btn-outline-dark" download>
이미지 다운로드
</a>

</div>


<!-- 오른쪽 영역 -->
<div class="col-md-6">

<p><b>광고기간</b></p>
<p id="period"></p>

<!-- 충돌 메시지 -->
<div id="conflictMessage" class="text-danger fw-bold mb-2"></div>

<hr>

<input id="mailTitle" class="form-control mb-2" placeholder="메일 제목">

<textarea id="mailContent" class="form-control mb-2" rows="4" placeholder="메일 내용"></textarea>

<div class="d-flex gap-2">

<button class="btn btn-danger" onclick="rejectAd()">반려</button>

<button id="approveBtn" class="btn btn-primary" onclick="approveAd()">승인</button>

</div>

</div>

</div>

</div>

</div>
</div>
</div>

</th:block>
</body>
</html>
