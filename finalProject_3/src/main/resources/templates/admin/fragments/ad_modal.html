<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="adModal">

<div class="modal fade" id="adDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title fw-bold"><i class="bi bi- megaphone-fill me-2"></i>광고 신청 상세 정보</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body p-4">
                <div class="row g-4">
                    
                    <div class="col-lg-7">
                        <div class="card h-100 border-0 bg-light">
                            <div class="card-body">
                                <h6 class="fw-bold mb-3 text-primary"><i class="bi bi-info-circle me-1"></i> 신청 서류 내용</h6>
                                
                                <div class="row mb-2">
                                    <div class="col-sm-4 text-muted">업체/담당자</div>
                                    <div class="col-sm-8 fw-bold"><span id="brandName"></span> (<span id="managerName"></span>)</div>
                                </div>
                                <div class="row mb-2">
                                    <div class="col-sm-4 text-muted">연락처/이메일</div>
                                    <div class="col-sm-8"><span id="phone"></span> / <span id="companyEmail" class="text-primary"></span></div>
                                </div>
                                <div class="row mb-2">
                                    <div class="col-sm-4 text-muted">광고 기간</div>
                                    <div class="col-sm-8 text-danger fw-bold"><span id="period"></span> (<span id="durationWeeks"></span>주)</div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-sm-4 text-muted">결제 예정 금액</div>
                                    <div class="col-sm-8 fw-bold text-success"><span id="amount"></span>원</div>
                                </div>

                                <hr>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">광고 문구 및 상세</label>
                                    <div id="content" class="p-3 bg-white border rounded" style="min-height: 100px; white-space: pre-wrap;"></div>
                                </div>

                                <div class="mb-3 text-center">
                                    <label class="form-label d-block text-start fw-bold">첨부 배너 이미지</label>
                                    <img id="adImage" class="img-thumbnail shadow-sm mb-2" style="max-height:250px; cursor: pointer;" onclick="window.open(this.src)">
                                    <div class="d-grid">
                                        <a id="downloadBtn" class="btn btn-outline-secondary btn-sm"><i class="bi bi-download me-1"></i> 이미지 원본 다운로드</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-5">
                        <div id="statusCompleted" class="alert alert-info d-none mb-3 text-center">
                            <h5 class="alert-heading fw-bold mb-1" id="statusText">처리 완료</h5>
                            <small id="processedAtText"></small>
                        </div>

                        <div id="actionArea">
                            <div class="card border-primary mb-3">
                                <div class="card-body">
                                    <h6 class="fw-bold mb-3 text-primary"><i class="bi bi-envelope-paper me-1"></i> 피드백 메일 발송</h6>
                                    
                                    <div class="mb-3">
                                        <label class="small text-muted mb-1">수신 이메일</label>
                                        <input type="text" id="targetEmail" class="form-control bg-light" readonly>
                                    </div>

                                    <div class="mb-3">
                                        <label class="small text-muted mb-1">메일 제목</label>
                                        <input id="mailTitle" class="form-control shadow-sm" placeholder="수신자에게 보낼 제목">
                                    </div>

                                    <div class="mb-3">
                                        <label class="small text-muted mb-1">메일 내용 (거절 시 사유 입력)</label>
                                        <textarea id="mailContent" class="form-control shadow-sm" rows="6" placeholder="승인/반려 관련 상세 안내 내용을 입력하세요."></textarea>
                                    </div>

                                    <div id="conflictMessage" class="alert alert-warning py-2 small d-none"></div>

                                    <div class="d-flex gap-2 justify-content-end mt-4">
                                        <button class="btn btn-outline-danger px-4" onclick="setRejectTemplate()">반려 양식</button>
                                        <button class="btn btn-outline-primary px-4" onclick="setApproveTemplate()">승인 양식</button>
                                    </div>
                                </div>
                            </div>

                            <div class="row g-2">
                                <div class="col-6">
                                    <button class="btn btn-danger w-100 py-2 fw-bold" onclick="rejectAd()">최종 반려</button>
                                </div>
                                <div class="col-6">
                                    <button id="approveBtn" class="btn btn-primary w-100 py-2 fw-bold" onclick="approveAd()">최종 승인</button>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

</th:block>
</body>
</html>
