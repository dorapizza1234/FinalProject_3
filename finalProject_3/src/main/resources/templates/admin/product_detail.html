<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 상세 - 관리자</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/admin/sideBar.css}">
    <style>
        body { background: #f0f2f5; }

        .detail-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border-radius: 18px;
            padding: 28px 32px;
            color: #fff;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,.2);
        }
        .status-pill {
            padding: 6px 18px;
            border-radius: 50px;
            font-size: .82rem;
            font-weight: 700;
            display: inline-block;
        }
        .status-onsale  { background: rgba(28,200,138,.2); color: #1cc88a; }
        .status-reserve { background: rgba(246,194,62,.2);  color: #f6c23e; }
        .status-soldout { background: rgba(133,135,150,.2); color: #c0c4d0; }

        .info-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,.07);
            padding: 24px;
            margin-bottom: 20px;
        }
        .info-card h6 {
            font-size: .78rem;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: #6c757d;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f2f5;
        }
        .info-row {
            display: flex;
            align-items: flex-start;
            padding: 10px 0;
            border-bottom: 1px solid #f8f9fc;
            font-size: .9rem;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label {
            min-width: 110px;
            color: #6c757d;
            font-size: .82rem;
            padding-top: 2px;
        }
        .info-value { font-weight: 600; color: #2d3436; }

        /* image gallery */
        .img-gallery { display: flex; flex-wrap: wrap; gap: 12px; }
        .img-thumb {
            width: 130px; height: 130px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #e9ecef;
            cursor: pointer;
            transition: transform .2s, border-color .2s;
        }
        .img-thumb:hover { transform: scale(1.04); border-color: #4e73df; }

        /* desc box */
        .desc-box {
            background: #f8f9fc;
            border-radius: 12px;
            padding: 16px;
            font-size: .9rem;
            line-height: 1.7;
            white-space: pre-wrap;
            color: #2d3436;
            min-height: 80px;
        }

        .btn-back {
            border-radius: 10px;
            font-weight: 600;
            padding: 9px 22px;
        }
    </style>
</head>
<body class="d-flex">
<aside th:replace="~{admin/admin_sidebar :: adminSidebar}"></aside>

<main class="main-content w-100">

    <!-- 상품 없음 -->
    <div th:if="${product == null}" class="alert alert-warning rounded-3">
        <i class="bi bi-exclamation-triangle me-2"></i>상품을 찾을 수 없습니다.
        <a th:href="@{/admin/product}" class="btn btn-sm btn-secondary ms-3">목록으로</a>
    </div>

    <div th:if="${product != null}">

        <!-- ── dark header ── -->
        <div class="detail-header">
            <div class="d-flex align-items-start justify-content-between flex-wrap gap-3">
                <div>
                    <div class="text-white-50 small mb-1">
                        <i class="bi bi-hash"></i><span th:text="${product.productNo}"></span>
                        &nbsp;·&nbsp;<span th:text="${product.categoryName}"></span>
                    </div>
                    <h3 class="fw-bold mb-2" th:text="${product.productName}">상품명</h3>
                    <div class="d-flex align-items-center gap-3 flex-wrap">
                        <span class="status-pill"
                              th:classappend="${product.tradeStatus == '예약중'} ? 'status-reserve' : (${product.tradeStatus == '판매완료'} ? 'status-soldout' : 'status-onsale')"
                              th:text="${product.tradeStatus}">판매중</span>
                        <span class="text-white-50 small">
                            <i class="bi bi-person me-1"></i>
                            <span th:text="${product.sellerNickname}">닉네임</span>
                            &nbsp;(<span th:text="${product.sellerEmail}"></span>)
                        </span>
                    </div>
                </div>
                <div class="text-end">
                    <div class="text-white-50 small mb-1">판매가격</div>
                    <div class="h3 fw-bold mb-0"
                         th:text="${product.productPrice != null and product.productPrice > 0
                             ? #numbers.formatInteger(product.productPrice, 0, 'COMMA') + '원'
                             : '무료나눔'}">0원</div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <!-- left col: info + description -->
            <div class="col-lg-5">

                <!-- 기본 정보 -->
                <div class="info-card">
                    <h6><i class="bi bi-info-circle me-2"></i>기본 정보</h6>
                    <div class="info-row">
                        <span class="info-label"><i class="bi bi-tag me-1"></i>카테고리</span>
                        <span class="info-value" th:text="${product.categoryName}">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label"><i class="bi bi-arrow-left-right me-1"></i>거래방식</span>
                        <span class="info-value" th:text="${product.tradeMethod}">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label"><i class="bi bi-activity me-1"></i>거래상태</span>
                        <span class="info-value">
                            <span class="badge rounded-pill px-3"
                                  th:classappend="${product.tradeStatus == '예약중'} ? 'bg-warning text-dark' : (${product.tradeStatus == '판매완료'} ? 'bg-secondary' : 'bg-success')"
                                  th:text="${product.tradeStatus}">판매중</span>
                        </span>
                    </div>
                    <div class="info-row">
                        <span class="info-label"><i class="bi bi-calendar3 me-1"></i>등록일</span>
                        <span class="info-value" th:text="${product.regDate}">-</span>
                    </div>
                    <!-- 예약중: 구매자 정보 -->
                    <div th:if="${product.tradeStatus == '예약중'}" class="info-row"
                         style="background:#fff8e1;border-radius:8px;padding:10px 12px;margin-top:4px;border-bottom:none;">
                        <span class="info-label"><i class="bi bi-person-check me-1 text-warning"></i>예약자</span>
                        <span class="info-value">
                            <span th:if="${product.buyerNickname != null}"
                                  th:text="${product.buyerNickname} + ' (' + ${product.buyerEmail} + ')'">-</span>
                            <span th:if="${product.buyerNickname == null}" class="text-muted">정보 없음</span>
                        </span>
                    </div>
                </div>

                <!-- 판매자 정보 -->
                <div class="info-card">
                    <h6><i class="bi bi-person-badge me-2"></i>판매자 정보</h6>
                    <div class="info-row">
                        <span class="info-label"><i class="bi bi-person me-1"></i>닉네임</span>
                        <span class="info-value" th:text="${product.sellerNickname}">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label"><i class="bi bi-envelope me-1"></i>이메일</span>
                        <span class="info-value" th:text="${product.sellerEmail}">-</span>
                    </div>
                </div>

                <!-- 상품 설명 -->
                <div class="info-card">
                    <h6><i class="bi bi-text-paragraph me-2"></i>상품 설명</h6>
                    <div class="desc-box" th:text="${product.productDesc}">설명이 없습니다.</div>
                </div>
            </div>

            <!-- right col: images -->
            <div class="col-lg-7">
                <div class="info-card">
                    <h6><i class="bi bi-images me-2"></i>상품 이미지
                        <span class="text-muted fw-normal"
                              th:if="${product.images != null}"
                              th:text="'(' + ${#lists.size(product.images)} + '장)'"></span>
                    </h6>
                    <div th:if="${product.images == null or #lists.isEmpty(product.images)}"
                         class="text-muted text-center py-5">
                        <i class="bi bi-image fs-1 d-block mb-2 opacity-25"></i>등록된 이미지가 없습니다.
                    </div>
                    <div th:if="${product.images != null and not #lists.isEmpty(product.images)}"
                         class="img-gallery">
                        <img th:each="img : ${product.images}"
                             th:src="${img}"
                             class="img-thumb"
                             alt="상품이미지"
                             onclick="openImgModal(this.src)">
                    </div>
                </div>
            </div>
        </div>

        <!-- back button + delete -->
        <div class="mt-2 d-flex gap-2">
            <a th:href="@{/admin/product}" class="btn btn-secondary btn-back">
                <i class="bi bi-arrow-left me-2"></i>목록으로
            </a>
            <button class="btn btn-danger btn-back" onclick="openDeleteModal()">
                <i class="bi bi-trash me-2"></i>상품 삭제
            </button>
        </div>
    </div>
</main>

<!-- 삭제 확인 모달 -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius:16px;border:none;box-shadow:0 24px 64px rgba(0,0,0,.18);">
            <div style="height:4px;background:linear-gradient(90deg,#e74a3b,#f6c23e);border-radius:16px 16px 0 0;"></div>
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-trash me-2 text-danger"></i>상품 삭제</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body pt-2">
                <!-- 판매완료: 메시지 없이 확인만 -->
                <div id="sectionSoldout" style="display:none;">
                    <div class="alert alert-secondary rounded-3">
                        <i class="bi bi-info-circle me-2"></i>판매완료 상품입니다. 삭제만 진행됩니다.
                    </div>
                </div>
                <!-- 판매중/예약중: 메시지 작성 -->
                <div id="sectionMsg">
                    <p class="text-muted small mb-3">삭제 전 관련 회원에게 메시지를 전송합니다.</p>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-person me-1"></i>판매자 메시지
                            <span class="text-muted small" id="sellerEmailLabel"></span>
                        </label>
                        <textarea id="sellerMsg" class="form-control" rows="3"
                                  placeholder="판매자에게 전달할 메시지를 입력하세요"></textarea>
                    </div>
                    <div id="buyerSection" style="display:none;">
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-warning">
                                <i class="bi bi-person-check me-1"></i>예약자 메시지
                                <span class="text-muted small" id="buyerEmailLabel"></span>
                            </label>
                            <textarea id="buyerMsg" class="form-control" rows="3"
                                      placeholder="예약자에게 전달할 메시지를 입력하세요"></textarea>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-secondary rounded-3" data-bs-dismiss="modal">취소</button>
                <button class="btn btn-danger rounded-3 fw-bold" onclick="confirmDelete()">
                    <i class="bi bi-trash me-1"></i>삭제 확인
                </button>
            </div>
        </div>
    </div>
</div>

<!-- image lightbox modal -->
<div class="modal fade" id="imgModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content bg-transparent border-0">
            <div class="text-end mb-2">
                <button class="btn btn-sm btn-light rounded-circle" data-bs-dismiss="modal">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            <img id="modalLargeImg" src="" alt="확대 이미지"
                 style="width:100%;border-radius:14px;object-fit:contain;max-height:80vh;">
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const productNo     = [[${product != null ? product.productNo : 0}]];
    const sellerEmail   = [[${product != null ? product.sellerEmail : ''}]];
    const buyerEmail    = [[${product != null ? product.buyerEmail : ''}]];
    const tradeStatus   = [[${product != null ? product.tradeStatus : ''}]];

    function openImgModal(src) {
        document.getElementById('modalLargeImg').src = src;
        new bootstrap.Modal(document.getElementById('imgModal')).show();
    }

    function openDeleteModal() {
        const soldout = tradeStatus === '판매완료';
        document.getElementById('sectionSoldout').style.display = soldout ? '' : 'none';
        document.getElementById('sectionMsg').style.display     = soldout ? 'none' : '';
        if (!soldout) {
            document.getElementById('sellerEmailLabel').textContent = '(' + sellerEmail + ')';
            const hasBuyer = tradeStatus === '예약중' && buyerEmail;
            document.getElementById('buyerSection').style.display = hasBuyer ? '' : 'none';
            if (hasBuyer) {
                document.getElementById('buyerEmailLabel').textContent = '(' + buyerEmail + ')';
            }
        }
        new bootstrap.Modal(document.getElementById('deleteModal')).show();
    }

    function confirmDelete() {
        const params = new URLSearchParams();
        params.append('productNo', productNo);
        if (tradeStatus !== '판매완료') {
            params.append('sellerEmail', sellerEmail);
            params.append('sellerMsg', document.getElementById('sellerMsg').value);
            if (tradeStatus === '예약중' && buyerEmail) {
                params.append('buyerEmail', buyerEmail);
                params.append('buyerMsg', document.getElementById('buyerMsg').value);
            }
        }
        fetch('/admin/product/delete', { method: 'POST', body: params })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    alert('상품이 삭제되었습니다.');
                    location.href = '/admin/product';
                } else {
                    alert('삭제 실패: ' + (data.message || ''));
                }
            });
    }
</script>
</body>
</html>
