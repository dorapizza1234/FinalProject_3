<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head>
<meta charset="UTF-8">
<title>콘텐츠 관리</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/admin/sideBar.css}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f8f9fc;
font-family:Pretendard;
}

.main-content{
flex:1;
padding:25px;
}

.dashboard-card{
background:white;
border-radius:12px;
box-shadow:0 0.15rem 1.75rem rgba(58,59,69,0.1);
padding:20px;
margin-bottom:24px;
}

/* 캘린더 */

.calendar-table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
}

.calendar-table th{
text-align:center;
padding:8px;
font-size:12px;
}

.calendar-table td{
border:1px solid #eee;
height:80px;
vertical-align:top;
padding:5px;
}

.day-num{
font-size:12px;
font-weight:700;
}

.ad-tag{
font-size:10px;
padding:2px 6px;
border-radius:4px;
color:white;
margin-top:2px;
display:block;
}

</style>

</head>

<body class="d-flex">

<!-- sidebar -->
<aside th:replace="~{admin/admin_sidebar :: adminSidebar}"></aside>

<main class="main-content">

<div class="container-fluid">

<h4 class="fw-bold mb-4">광고 콘텐츠 관리</h4>

<div class="row">

<!-- 왼쪽 -->

<div class="col-lg-7">

<div class="dashboard-card">

<div class="d-flex justify-content-between mb-3">

<b id="waitingText">대기중 광고</b>

<select id="chartType" class="form-select form-select-sm w-auto">
<option>매출</option>
<option>문의</option>
</select>

</div>

<div style="height:250px">
<canvas id="mainChart"></canvas>
</div>

</div>

<div class="dashboard-card">

<h6 class="fw-bold mb-3">진행중 광고</h6>

<ul class="list-group list-group-flush" id="runningList">

</ul>

</div>

</div>

<!-- 오른쪽 캘린더 -->

<div class="col-lg-5">

<div class="dashboard-card">

<h5 class="fw-bold mb-3">광고 캘린더</h5>

<table class="calendar-table">

<thead>

<tr>
<th>MON</th>
<th>TUE</th>
<th>WED</th>
<th>THU</th>
<th>FRI</th>
<th>SAT</th>
<th>SUN</th>
</tr>

</thead>

<tbody>

<tr th:each="week : ${calendarWeeks}">

<td th:each="day : ${week}">

<div class="day-num"
th:text="${day}">
</div>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<!-- 광고 리스트 -->

<div class="dashboard-card">

<h5 class="fw-bold mb-3">광고 리스트</h5>

<table class="table table-hover">

<thead class="table-light">

<tr>
<th>브랜드</th>
<th>담당자</th>
<th>이메일</th>
<th>금액</th>
<th>상태</th>
<th>관리</th>
</tr>

</thead>

<tbody>

<tr th:each="ad : ${adList}">

<td><strong th:text="${ad.brandName}"></strong></td>

<td th:text="${ad.managerName}"></td>

<td th:text="${ad.companyEmail}"></td>

<td th:text="${ad.amount}"></td>

<td th:text="${ad.status}"></td>

<td>

<button class="btn btn-sm btn-dark"
data-bs-toggle="modal"
data-bs-target="#adDetailModal"
th:attr="data-adid=${ad.adId}">
상세보기
</button>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</main>

<div th:replace="~{admin/fragments/ad_modal :: adModal}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">

/* 서버 데이터 */

let ads = /*[[${adList}]]*/ [];

/* 대기 광고 */

let waiting = ads.filter(a => a.status === 'WAIT').length;

document.getElementById("waitingText").innerText =
"대기중 광고 " + waiting + "건 있습니다";

/* 진행 광고 리스트 */

const runningList = document.getElementById("runningList");

runningList.innerHTML = ads
.filter(a => a.status === 'CONFIRM')
.map(ad => `

<li class="list-group-item">

<b>${ad.brandName}</b><br>

<small>${ad.startDate} ~ ${ad.endDate}</small>

</li>

`).join("");

/* 차트 */

const ctx = document.getElementById("mainChart");

new Chart(ctx, {
type:'line',
data:{
labels:['10월','11월','12월','1월','2월','3월'],
datasets:[{
data:[30,55,40,70,85,60],
borderColor:'#4e73df',
backgroundColor:'rgba(78,115,223,0.05)',
fill:true,
tension:0.4
}]
},
options:{
maintainAspectRatio:false
}
});

</script>

</body>
</html>
