<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회계상태 - 관리자</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin/sideBar.css}">
</head>
<body class="d-flex">
   <aside th:replace="~{admin/admin_sidebar :: adminSidebar}"></aside>
    <main class="main-content">
        <div class="row g-3 mb-3">
            <div class="col-md-5">
                <div class="account-card">
                    <div class="card-title">카테고리별 금액 내역</div>
                    <div class="pie-wrap">
                        <div class="pie-chart"></div>
                        <div class="pie-legend-list">
                            <div>전자기기(17%) <span th:text="${electronicsAmount != null ? electronicsAmount : '250000원'}">250000원</span></div>
                            <div>의류(63%) <span th:text="${apparelAmount != null ? apparelAmount : '30000만원'}">30000만원</span></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stacked-card">
                    <div class="label">미사용 예치금</div>
                    <div class="value" th:text="${unusedDeposit != null ? unusedDeposit : '1,620,000원'}">1,620,000원</div>
                </div>
                <div class="stacked-card">
                    <div class="label">이벤트 처리비용</div>
                    <div class="value" th:text="${eventCost != null ? eventCost : '100,000원'}">100,000원</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stacked-card">
                    <div class="label">이번달 광고수익</div>
                    <div class="value" th:text="${adRevenue != null ? adRevenue : '4,000,000원'}">4,000,000원</div>
                </div>
                <div class="stacked-card">
                    <div class="label">다음달 수익 예정</div>
                    <div class="value" th:text="${nextMonthRevenue != null ? nextMonthRevenue : '2,000,000원'}">2,000,000원</div>
                </div>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-md-6">
                <div class="account-card">
                    <div class="card-title">월별 순수익 그래프</div>
                    <div class="graph-subtitle">순수익: 광고비용-이벤트비용</div>
                    <div class="month-bars">
                        <div class="month-bar-item">
                            <span class="month">1월</span>
                            <div class="bar-track"><div class="bar-fill" style="width: 40%"></div></div>
                        </div>
                        <div class="month-bar-item">
                            <span class="month">2월</span>
                            <div class="bar-track"><div class="bar-fill" style="width: 65%"></div></div>
                        </div>
                        <div class="month-bar-item">
                            <span class="month">3월</span>
                            <div class="bar-track"><div class="bar-fill" style="width: 55%"></div></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="account-card">
                    <div class="card-title">현재 자산 상태</div>
                    <div class="asset-status-title" th:text="${assetStatus != null ? assetStatus : '안전'}">안전</div>
                    <div class="asset-list">
                        <div>[순수익] <span th:text="${netProfit != null ? netProfit : '3,900,000원'}">3,900,000원</span></div>
                        <div>[미사용 예치금] <span th:text="${unusedDeposit != null ? unusedDeposit : '1,620,000원'}">1,620,000원</span></div>
                        <div>[이벤트 비용] <span th:text="${eventCost != null ? eventCost : '100,000원'}">100,000원</span></div>
                        <div>[자산 상태 위험] <span th:text="${riskPercent != null ? riskPercent : '약 43%'}">약 43%</span></div>
                    </div>
                    <div class="risk-legend">
                        <span>0~50% 초록: 안정</span>
                        <span>50~80% 노랑: 주의</span>
                        <span>-80~ 빨강: 위험</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
