<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>채팅 팝업 조각</title>
</head>

<body>
<main th:fragment="chat_popup">

    <style>
        /* 팝업 전체 컨테이너 */
        .chat-modal { position: fixed; top: 10%; right: 5%; width: 55%; height: 75%; background: #fff; z-index: 10000; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); display: none; overflow: hidden; }
        .chat-container { display: flex; height: 100%; }
        /* 좌측: 채팅방 목록 */
        .chat-sidebar { width: 35%; background: #f2f2f2; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: #222; color: #fff; font-size: 18px; font-weight: bold; border-bottom: 1px solid #333; }
        .room-list { flex: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .room-item { padding: 15px; border-bottom: 1px solid #e5e5e5; cursor: pointer; transition: background 0.2s; display: flex; flex-direction: column; }
        .room-item:hover { background: #e9e9e9; }
        /* 우측: 실제 채팅창 */
        .chat-main { width: 65%; display: flex; flex-direction: column; background: #fff; }
        .chat-header { padding: 15px 20px; background: #222; color: #fff; display: flex; justify-content: space-between; align-items: center; }
        .chat-header h4 { margin: 0; font-size: 16px; }
        .close-chat { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
        #msgDisplayArea { flex: 1; overflow-y: auto; padding: 20px; background: #f9f9f9; display: flex; flex-direction: column; gap: 10px; }
        /* 메시지 풍선 스타일 */
        .message { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 14px; position: relative; word-break: break-all; }
        .msg-mine { align-self: flex-end; background: #222; color: #fff; border-bottom-right-radius: 2px; }
        .msg-other { align-self: flex-start; background: #e2e2e2; color: #222; border-bottom-left-radius: 2px; }
        /* 입력 영역 */
        .chat-input-row { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .chat-input-row input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
        .chat-input-row input:focus { border-color: #222; }
        .chat-btn-send { background: #222; color: #fff; border: none; padding: 0 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>

    <div id="chatModal" class="chat-modal">
        <div class="chat-container">
            <div class="chat-sidebar">
                <div class="sidebar-header">채팅 목록</div>
                <ul class="room-list" id="roomListArea"></ul>
            </div>

            <div class="chat-main">
                <div class="chat-header">
                    <h4 id="currentRoomTitle">대화방을 선택해 주세요</h4>
                    <button class="close-chat" onclick="window.toggleChatPopup()">×</button>
                </div>
                <div id="msgDisplayArea"></div>
                <div class="chat-input-row">
                    <input type="text" id="chatInput" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) window.sendChatMessage()">
                    <button class="chat-btn-send" onclick="window.sendChatMessage()">전송</button>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        let stompClient = null;
        let currentRoomId = null;
        const currentUserEmail = /*[[${#authentication.name}]]*/ 'guest';
        
        // ★ 현재 구독 중인 웹소켓 채널을 저장할 변수 추가
        window.currentSubscription = null; 

        window.toggleChatPopup = function() {
            const modal = document.getElementById('chatModal');
            if (modal) {
                if (modal.style.display === 'none' || modal.style.display === '') {
                    modal.style.display = 'block';
                    window.loadChatRoomList(); 
                    if (typeof window.connectWebSocket === 'function') window.connectWebSocket();
                } else {
                    modal.style.display = 'none';
                }
            }
        };

        window.loadChatRoomList = function() {
            fetch('/finalProject_3/api/chat/roomList')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        window.renderRoomList(data.roomList);
                    } else {
                        console.error("목록 불러오기 실패:", data.message);
                    }
                })
                .catch(error => console.error("API 호출 에러:", error));
        };

        window.renderRoomList = function(roomList) {
            const ulArea = document.getElementById('roomListArea');
            ulArea.innerHTML = ''; 

            if (!roomList || roomList.length === 0) {
                ulArea.innerHTML = '<li style="padding:15px; text-align:center; color:#888;">참여 중인 대화가 없습니다.</li>';
                return;
            }

            roomList.forEach(room => {
                const previewMsg = room.lastMessage ? room.lastMessage : '새로운 대화를 시작해보세요.';
                const timeStr = room.lastMessageAt ? room.lastMessageAt : '';
                const targetUser = room.otherUserEmail;

                const li = document.createElement('li');
                li.className = 'room-item';
                li.onclick = function() { window.openChatRoom(room.roomId, targetUser, room.productName); };

                li.innerHTML = `
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <strong style="font-size:14px;">${targetUser}</strong>
                        <span style="font-size:12px; color:#999;">${timeStr}</span>
                    </div>
                    <div style="font-size:13px; color:#666; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                        [${room.productName}] ${previewMsg}
                    </div>
                `;
                ulArea.appendChild(li);
            });
        };

        // ★ 수정된 방 클릭 시 실행 함수
        window.openChatRoom = function(roomId, targetUser, productName) {
            currentRoomId = roomId;
            document.getElementById('currentRoomTitle').innerText = `${targetUser}님과의 대화 (${productName})`;
            document.getElementById('msgDisplayArea').innerHTML = ''; // 화면 초기화

            // 1. 과거 메시지 불러오기 (Firebase 연동 API 호출)
            fetch(`/api/chat/messages/${roomId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success && data.messages) {
                        data.messages.forEach(msg => window.showMessage(msg));
                    }
                })
                .catch(error => console.error("메시지 로드 에러:", error));

            // 2. 해당 방의 실시간 메시지를 받기 위해 웹소켓 '구독(Subscribe)' 설정
            if (stompClient && stompClient.connected) {
                // 이전에 다른 방을 구독하고 있었다면 끊어줍니다. (메시지 중복 수신 방지)
                if (window.currentSubscription) {
                    window.currentSubscription.unsubscribe();
                }
                
                // 새로운 방 구독 시작!
                window.currentSubscription = stompClient.subscribe(`/topic/room/${roomId}`, function(messageOutput) {
                    const receivedMsg = JSON.parse(messageOutput.body);
                    window.showMessage(receivedMsg);
                });
            } else {
                window.connectWebSocket(); // 연결 안 되어 있으면 연결 시도
            }
        };

        window.connectWebSocket = function() {
            if (stompClient !== null && stompClient.connected) return;
            const socket = new SockJS('/finalProject_3/ws-chat');
            stompClient = Stomp.over(socket);
            stompClient.connect({}, function (frame) {}, function(error) { console.error(error); });
        };

        window.sendChatMessage = function() {
            const content = document.getElementById('chatInput').value.trim();
            if (!content || !stompClient || !currentRoomId) return;

            const chatMessage = {
                sender: currentUserEmail,
                content: content,
                roomId: currentRoomId,
                timestamp: new Date().toISOString()
            };

            stompClient.send("/app/chat/send", {}, JSON.stringify(chatMessage));
            document.getElementById('chatInput').value = '';
        };

        window.showMessage = function(message) {
            const area = document.getElementById('msgDisplayArea');
            const isMine = message.sender === currentUserEmail;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isMine ? 'msg-mine' : 'msg-other'}`;
            msgDiv.innerText = message.content;
            area.appendChild(msgDiv);
            area.scrollTop = area.scrollHeight; 
        };
        /*]]>*/
    </script>

</main>
</body>
</html>
