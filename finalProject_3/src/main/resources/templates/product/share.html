<!DOCTYPE html>
<html th:replace="~{layout/layout_main :: layout(~{::head}, ~{::main}, ~{::script})}"
      xmlns:th="http://www.thymeleaf.org"
      lang="ko">
<head>
<link rel="stylesheet" th:href="@{/css/product_form.css}">
<script defer th:src="@{/js/product_form.js}"></script>
</head>

<body>
<!-- main 필수 -->
  <main class="pf-wrap" data-active="share">
  <nav class="pf-tabs" aria-label="등록 유형">
  <a class="pf-tab" th:href="@{/product/sell}" data-tab="sell">판매하기</a>
  <a class="pf-tab" th:href="@{/product/share}" data-tab="share">나눔하기</a>
  <a class="pf-tab" th:href="@{/product/auction}" data-tab="auction">경매하기</a>
  <span class="pf-tab-underline" aria-hidden="true"></span>
</nav>

 <section class="pf-section">
    <h2 class="pf-title">상품 정보</h2>
    <div class="pf-title-line" aria-hidden="true"></div>

    <form id="pfForm"
      class="pf-form"
      th:action="@{/product/sell}"
      method="post"
      enctype="multipart/form-data">

      <input type="hidden" name="saleType" value="판매">
      <input type="hidden" name="tradeStatus" value="판매중">

      <!-- =========================
           1) 이미지(1~3) + 대표
      ========================== -->
      <div class="pf-row">
        <div class="pf-label">상품 이미지</div>
        <div class="pf-field pf-field-upload">
          <label class="pf-upload" for="pfImageInput">
            <span class="pf-upload-icon" aria-hidden="true">📷</span>
            <span class="pf-upload-text">이미지 등록</span>
           <input id="pfImageInput"
       class="pf-upload-input"
       type="file"
       name="images"
       accept="image/*"
       multiple>
          </label>

          <div class="pf-preview" id="pfPreviewWrap" aria-label="미리보기"></div>

          <!-- 대표 이미지 인덱스(0~2) -->
          <input type="hidden" id="pfMainIndex" name="mainIndex" value="0">
        </div>
      </div>

      <!-- 상품명 -->
      <div class="pf-row">
        <div class="pf-label">상품명</div>
        <div class="pf-field">
          <input class="pf-input"
                 type="text"
                 name="productName"
                 placeholder="상품명을 입력해 주세요."
                 required />
        </div>
      </div>

      <!-- 카테고리 -->
      <div class="pf-row">
        <div class="pf-label">카테고리</div>
        <div class="pf-field pf-field-narrow">
          <select class="pf-select" name="categoryNo" aria-label="카테고리" required>
            <option value="" disabled selected>카테고리를 선택해 주세요</option>
            <option value="1">패션(수입명품 / 패션의류 / 패션잡화 / 뷰티)</option>
            <option value="2">육아(출산 / 유아동)</option>
            <option value="3">가전(가전제품)</option>
            <option value="4">홈·인테리어(가구 / 인테리어 / 리빙 / 생활)</option>
            <option value="5">취미(게임, 반려동물, 독서)</option>
            <option value="6">여행(등산, 캠핑 등등)</option>
            <option value="7">공구/산업용품</option>
          </select>
        </div>
      </div>

      <!-- 상품 설명 -->
      <div class="pf-row">
        <div class="pf-label">상품 설명</div>
        <div class="pf-field">
          <div class="pf-textarea-wrap">
            <textarea class="pf-textarea"
                      name="productDesc"
                      maxlength="5000"
                      placeholder="- 상품명(브랜드)
- 구매 시기 (년, 월, 일)
- 사용 기간
- 하자 여부
* 실제 촬영한 사진과 함께 상세 정보를 입력해주세요."></textarea>
            <div class="pf-count">
              <span class="pf-count-now">0</span> / 5000
            </div>
          </div>
        </div>
      </div>

      <!-- 상품 상태 -->
      <div class="pf-row">
        <div class="pf-label">상품 상태</div>
        <div class="pf-field">
          <div class="pf-radio-row" role="radiogroup" aria-label="상품 상태">
            <label class="pf-radio">
              <input type="radio" name="productCondition" value="상" checked />
              <span class="pf-dot" aria-hidden="true"></span><span>상</span>
            </label>
            <label class="pf-radio">
              <input type="radio" name="productCondition" value="중" />
              <span class="pf-dot" aria-hidden="true"></span><span>중</span>
            </label>
            <label class="pf-radio">
              <input type="radio" name="productCondition" value="하" />
              <span class="pf-dot" aria-hidden="true"></span><span>하</span>
            </label>
          </div>
        </div>
      </div>

      <!-- =========================
           거래 방법
      ========================== -->
      <div class="pf-trade">
        <div class="pf-trade-head">
          <div class="pf-trade-title">거래 방법</div>
          <div class="pf-trade-sub">구매자가 결제한 이후에는 거래 방법을 변경할 수 없어요</div>
        </div>

        <div class="pf-trade-wrap">
          <!-- ===== 택배거래 ===== -->
          <section class="pf-section">
            <div class="pf-section-title">택배거래</div>

            <div class="pf-trade-row">
              <div class="pf-trade-left">
                <label class="pf-check">
                  <input type="radio" name="tradeMethod" id="pfShipToggle" value="택배" checked />
                  <span class="pf-check-ui" aria-hidden="true"></span>
                  <span class="pf-check-text">택배거래</span>
                </label>
              </div>
            </div>

            <!-- 배송 옵션(체크박스) -->
            <div class="pf-ship-fee-detail is-open" id="pfShipOptionPanel" aria-hidden="false">
              <div class="pf-ship-fee-head">
                <h3 class="pf-ship-fee-title">가능한 배송 옵션 선택</h3>
              </div>
              <p class="pf-ship-fee-sub">원하는 배송 방법만 체크하고 배송비를 입력해 주세요.</p>

              <div class="pf-ship-fee-block">
                <label class="pf-check">
                  <input type="checkbox" class="pf-ship-opt" data-type="일반택배" value="일반택배">
                  <span class="pf-check-ui" aria-hidden="true"></span>
                  <span class="pf-check-text">일반택배</span>
                </label>
                <div class="pf-ship-fee-desc">택배사/편의점 접수 후 문 앞까지 배송</div>
                <input class="pf-input pf-ship-fee-input"
                       type="text" inputmode="numeric"
                       data-fee-for="일반택배"
                       placeholder="배송비 입력"
                       disabled>
              </div>

              <div class="pf-ship-fee-block">
                <label class="pf-check">
                  <input type="checkbox" class="pf-ship-opt" data-type="CU반값" value="CU반값">
                  <span class="pf-check-ui" aria-hidden="true"></span>
                  <span class="pf-check-text">CU 반값택배</span>
                </label>
                <div class="pf-ship-fee-desc">편의점 발송 → 지정 편의점 수령</div>
                <input class="pf-input pf-ship-fee-input"
                       type="text" inputmode="numeric"
                       data-fee-for="CU반값"
                       placeholder="배송비 입력"
                       disabled>
              </div>

              <div class="pf-ship-fee-block">
                <label class="pf-check">
                  <input type="checkbox" class="pf-ship-opt" data-type="GS반값" value="GS반값">
                  <span class="pf-check-ui" aria-hidden="true"></span>
                  <span class="pf-check-text">GS 반값택배</span>
                </label>
                <div class="pf-ship-fee-desc">편의점 발송 → 지정 편의점 수령</div>
                <input class="pf-input pf-ship-fee-input"
                       type="text" inputmode="numeric"
                       data-fee-for="GS반값"
                       placeholder="배송비 입력"
                       disabled>
              </div>

              
              <input type="hidden" id="pfShipOptionsJson" name="shippingOptionsJson" value="[]">
            </div>
          </section>

          <!-- ===== 직거래 ===== -->
          <section class="pf-section">
            <div class="pf-section-title">직거래</div>

            <div class="pf-trade-row">
              <div class="pf-trade-left">
                <label class="pf-check">
                  <input type="radio" name="tradeMethod" id="pfMeetToggle" value="직거래" />
                  <span class="pf-check-ui" aria-hidden="true"></span>
                  <span class="pf-check-text">만나서 직거래</span>
                </label>
              </div>

              <div class="pf-trade-right">
                <div class="pf-loc-chips" id="pfLocChips" aria-label="선택된 위치"></div>
                <button type="button" class="pf-loc-btn" id="pfLocationBtn">
                  <span>+ 위치 설정</span>
                </button>
              </div>
            </div>

            
            <input type="hidden" id="pfMeetLocations" name="meetLocationsJson" value="[]">

            <!-- 지역 변경 모달 -->
            <section class="area-modal" id="areaModal" aria-hidden="true">
              <div class="area-modal__backdrop" data-area-close="true"></div>

              <div class="area-modal__panel" role="dialog" aria-modal="true" aria-labelledby="areaModalTitle">
                <div class="area-modal__header">
                  <h2 class="area-modal__title" id="areaModalTitle">지역 변경</h2>
                  <button type="button" class="area-modal__close" aria-label="닫기" data-area-close="true">×</button>
                </div>

                <div class="area-modal__body">
                  <button type="button" class="area-search" id="areaSearchBtn">
                    <i class="fa-solid fa-location-dot"></i> 지역이나 동네로 검색하기
                  </button>

                  <button type="button" class="area-geo" id="areaUseGeoBtn">
                    <i class="fa-solid fa-location-crosshairs" aria-hidden="true"></i>
                    현재 내 위치 사용하기
                  </button>

                  <div class="area-list">
                    <div class="area-list__title">최근 검색한 동네</div>
                    <ul class="area-list__items" id="areaList">
                      <li><button type="button" class="area-item" data-area-value="서울특별시, 강남구, 대치1동">서울특별시, 강남구, 대치1동</button></li>
                      <li><button type="button" class="area-item" data-area-value="서울특별시, 강남구, 대치동">서울특별시, 강남구, 대치동</button></li>
                      <li><button type="button" class="area-item" data-area-value="서울특별시, 강남구, 대치2동">서울특별시, 강남구, 대치2동</button></li>
                      <li><button type="button" class="area-item" data-area-value="서울특별시, 강남구, 대치4동">서울특별시, 강남구, 대치4동</button></li>
                      <li><button type="button" class="area-item" data-area-value="서울특별시, 강남구, 개포3동">서울특별시, 강남구, 개포3동</button></li>
                    </ul>
                  </div>
                </div>
              </div>
            </section>

          </section>
        </div>
      </div>

      <div class="pf-footnote">판매 정보가 실제 상품과 다른 경우, 책임은 판매자에게 있음을 동의합니다.</div>
      <button class="pf-submit" id="pfSubmitBtn" type="submit">판매하기</button>

    </form>
    
  </section>

  </main>
 
</body>
</html>
