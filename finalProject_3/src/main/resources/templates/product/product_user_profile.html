<!DOCTYPE html>
<html
	th:replace="~{layout/layout_main :: layout(~{::head}, ~{::main}, ~{::script})}"
	xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
<link rel="stylesheet" th:href="@{/css/product/product_user_profile.css}">
</head>

<body>
	<main th:attr="data-product-no=${productNo}, data-login=${isLogin}">
		<section class="spx-wrap">
			<div class="spx-grid">

				<!-- LEFT -->
				<div class="spx-sellerCard">
					<div class="spx-sellerTop">
						<img th:src="@{/images/default_profile.png}" class="spx-avatar"
							aria-hidden="true" alt="판매자 프로필 이미지">
						<div>
							<div class="spx-sellerName">판매자 이름</div>
						</div>
					</div>

					<div class="spx-tempBlock">
						<div class="spx-tempLabel">매너온도</div>
						<div class="spx-tempValue">
							<strong>36.5°C</strong>
						</div>
						<div class="spx-bar" aria-label="매너온도 바">
							<i></i>
						</div>
						<div class="spx-tempNote">최근 3개월 기준 · 변경은 거래후기 반영</div>
					</div>

					<div class="spx-stats" role="group" aria-label="거래 지표">
						<div class="spx-statsRow">
							<div class="spx-stat">
								<div class="k">안심결제</div>
								<div class="v">0</div>
							</div>
							<div class="spx-statsDiv" aria-hidden="true"></div>
							<div class="spx-stat">
								<div class="k">거래후기</div>
								<div class="v">0</div>
							</div>
							<div class="spx-statsDiv" aria-hidden="true"></div>
							<div class="spx-stat">
								<div class="k">거래횟수</div>
								<div class="v">0</div>
							</div>
						</div>
					</div>
				</div>

				<!-- RIGHT -->
				<div>
					<div class="spx-revHead">
						<div class="spx-revTitle">최근후기</div>
					</div>

					<div class="spx-chips" aria-label="후기 키워드">
						<p class="spx-chip">친절해요 <span>0</span></p>
						<p class="spx-chip">시간 약속 잘 지켜요 <span>0</span></p>
						<p class="spx-chip">설명대로예요 <span>0</span></p>
						<p class="spx-chip">꼼꼼해요 <span>0</span></p>
					</div>

					<div class="spx-revList" id="spxRevList">
						<div class="sps-empty">등록된 후기가 없습니다.</div>
					</div>
				</div>

			</div>
		</section>

		<section class="sps-wrap">
			<div class="sps-head">
				<div class="sps-tabs" role="tablist" aria-label="판매자 탭">
					<button class="sps-tab is-active" type="button" role="tab"
						aria-selected="true" data-tab="sell">판매상품</button>
					<button class="sps-tab" type="button" role="tab"
						aria-selected="false" data-tab="review">거래후기</button>
					<span class="sps-underline" aria-hidden="true"></span>
				</div>
			</div>

			<!-- 판매상품 패널 -->
			<div class="sps-panel is-show" id="sps-panel-sell" role="tabpanel">

				<div class="sps-sellTop" aria-label="상품 정렬">
					<div class="sps-sort" role="tablist" aria-label="정렬 옵션">
						<button class="sps-sortBtn is-active" type="button" role="tab"
							aria-selected="true" data-sort="latest">최신순</button>
						<span class="sps-sep" aria-hidden="true"></span>
						<button class="sps-sortBtn" type="button" role="tab"
							aria-selected="false" data-sort="low">가격낮은순</button>
						<span class="sps-sep" aria-hidden="true"></span>
						<button class="sps-sortBtn" type="button" role="tab"
							aria-selected="false" data-sort="high">높은가격순</button>
						<span class="sps-sep" aria-hidden="true"></span>
						<button class="sps-sortBtn" type="button" role="tab"
							aria-selected="false" data-sort="pop">조회순</button>
					</div>
				</div>

				<div class="sps-grid" id="sps-grid">
					<div class="sps-empty">판매상품을 불러오는 중입니다.</div>
				</div>

				<div class="load-more-wrap">
					<button class="btn-load-more" id="sellLoadMoreBtn" type="button">
						더보기 <i class="fa-solid fa-angle-down"></i>
					</button>
				</div>
			</div>

			<!-- 거래후기 패널 -->
			<div class="sps-panel" id="sps-panel-review" role="tabpanel" hidden>

				<div class="sps-rvSummary" id="spsReviewSummary">
					<div class="sps-rvScore">
						<div class="sps-rvScoreBig">
							<strong>0.0</strong> <span>/ 5</span>
						</div>
						<div class="sps-rvStars" aria-label="평균 별점 0점">
							<i class="fa-regular fa-star"></i>
							<i class="fa-regular fa-star"></i>
							<i class="fa-regular fa-star"></i>
							<i class="fa-regular fa-star"></i>
							<i class="fa-regular fa-star"></i>
							<em class="sps-rvCount">후기 0</em>
						</div>
						<div class="sps-rvHint">전체 거래후기 기준</div>
					</div>

					<div class="sps-rvBadges" aria-label="후기 키워드 요약">
						<button class="sps-rvChip is-active" type="button">전체 <span>0</span></button>
						<button class="sps-rvChip" type="button">친절해요 <span>0</span></button>
						<button class="sps-rvChip" type="button">시간 약속 <span>0</span></button>
						<button class="sps-rvChip" type="button">설명대로예요 <span>0</span></button>
						<button class="sps-rvChip" type="button">꼼꼼해요 <span>0</span></button>
					</div>
				</div>

				<div class="sps-rvSortBar" aria-label="후기 정렬">
					<div class="sps-rvSort" role="tablist" aria-label="후기 정렬 옵션">
						<button class="sps-rvSortBtn is-active" type="button" role="tab"
							aria-selected="true">최신순</button>
						<span class="sps-sep" aria-hidden="true"></span>
						<button class="sps-rvSortBtn" type="button" role="tab"
							aria-selected="false">높은 별점순</button>
						<span class="sps-sep" aria-hidden="true"></span>
						<button class="sps-rvSortBtn" type="button" role="tab"
							aria-selected="false">낮은 별점순</button>
					</div>
				</div>

				<div class="sps-rvList" id="spsReviewList">
					<div class="sps-empty">등록된 후기가 없습니다.</div>
				</div>

				<div class="load-more-wrap">
					<button class="btn-load-more" id="reviewLoadMoreBtn" type="button">
						더보기 <i class="fa-solid fa-angle-down"></i>
					</button>
				</div>
			</div>

		</section>
	</main>

	<script th:src="@{/js/product/product_user_profile.js}"></script>

	<script th:inline="javascript">
document.addEventListener("DOMContentLoaded", function () {

    const ctxPath = /*[[@{/}]]*/ "";
    const ctxBase = ctxPath.replace(/\/$/, "");
    const main = document.querySelector("main");
    const productNo = main ? main.getAttribute("data-product-no") : "";
    const isLogin = main ? String(main.getAttribute("data-login")) === "true" : false;

    const sellerNameEl = document.querySelector(".spx-sellerName");
    const avatarEl = document.querySelector(".spx-avatar");
    const tempStrongEl = document.querySelector(".spx-tempValue strong");
    const tempBarEl = document.querySelector(".spx-bar i");
    const statEls = document.querySelectorAll(".spx-stat .v");

    const sellGrid = document.getElementById("sps-grid");
    const sortBtns = document.querySelectorAll(".sps-sortBtn");
    const sellLoadMoreBtn = document.getElementById("sellLoadMoreBtn");

    const tabs = document.querySelectorAll(".sps-tab");
    const sellPanel = document.getElementById("sps-panel-sell");
    const reviewPanel = document.getElementById("sps-panel-review");

    const topReviewListEl = document.getElementById("spxRevList");
    const reviewSummaryEl = document.getElementById("spsReviewSummary");
    const reviewListEl = document.getElementById("spsReviewList");
    const reviewSortBtns = document.querySelectorAll(".sps-rvSortBtn");
    const reviewLoadMoreBtn = document.getElementById("reviewLoadMoreBtn");

    let currentSort = "latest";
    let currentPage = 1;
    let isLoading = false;
    let hasMore = true;

    let reviewSortType = "latest";
    let reviewPage = 1;
    let reviewLoading = false;
    let reviewHasMore = true;
    let currentReviewCategory = "";

    if (!productNo) {
        alert("잘못된 접근입니다.");
        return;
    }

    loadSellerProfile();
    loadSellerProducts(true);
    loadSellerReviewSummary();
    loadSellerReviews(true);

    initTabs();
    initSortButtons();
    initLoadMore();
    initReviewSortButtons();
    initReviewLoadMore();
    initReviewCategoryButtons();
    initWishlistButtons();

    function loadSellerProfile() {
        fetch(ctxBase + "/product/seller/profile?productNo=" + encodeURIComponent(productNo), {
            method: "GET",
            headers: {
                "Accept": "application/json"
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error("판매자 정보를 불러오지 못했습니다.");
            }
            return response.json();
        })
        .then(data => {
            if (!data.success) {
                alert(data.message || "판매자 정보를 불러오지 못했습니다.");
                return;
            }

            const seller = data.seller || {};

            const sellerName = seller.sellerName || "판매자";
            const sellerProfileImg = buildImageUrl(
                seller.sellerProfileImg,
                ctxBase + "/images/default_profile.png"
            );
            const mannerTemp = seller.mannerTemp != null ? seller.mannerTemp : 36.5;
            const safePayCount = seller.safePayCount != null ? seller.safePayCount : 0;
            const reviewCount = seller.reviewCount != null ? seller.reviewCount : 0;
            const tradeCount = seller.tradeCount != null ? seller.tradeCount : 0;

            sellerNameEl.textContent = sellerName;
            avatarEl.src = sellerProfileImg;
            tempStrongEl.textContent = Number(mannerTemp).toFixed(1) + "°C";

            const tempInfo = calcTempStyle(mannerTemp);
            tempBarEl.style.width = tempInfo.percent + "%";
            tempBarEl.style.backgroundColor = tempInfo.color;
            tempStrongEl.style.color = tempInfo.color;

            if (statEls.length >= 3) {
                statEls[0].textContent = safePayCount;
                statEls[1].textContent = reviewCount;
                statEls[2].textContent = tradeCount;
            }
        })
        .catch(error => {
            console.error(error);
            alert("판매자 정보를 불러오는 중 오류가 발생했습니다.");
        });
    }

    function calcTempStyle(temp) {
        let value = parseFloat(temp);

        if (isNaN(value)) value = 0;
        if (value < 0) value = 0;
        if (value > 100) value = 100;

        let color = "#9ca3af";

        if (value <= 12.5) {
            color = "#9ca3af";
        } else if (value <= 30) {
            color = "#60a5fa";
        } else if (value <= 36.5) {
            color = "#2563eb";
        } else if (value <= 50.5) {
            color = "#22c55e";
        } else if (value <= 65.5) {
            color = "#eab308";
        } else {
            color = "#ef4444";
        }

        return {
            percent: value,
            color: color
        };
    }

    function loadSellerProducts(reset) {
        if (isLoading) return;
        if (!hasMore && !reset) return;

        isLoading = true;

        if (reset) {
            currentPage = 1;
            hasMore = true;
            sellGrid.innerHTML = "";
        }

        const url = ctxBase + "/product/seller/products"
            + "?productNo=" + encodeURIComponent(productNo)
            + "&sortType=" + encodeURIComponent(currentSort)
            + "&page=" + encodeURIComponent(currentPage)
            + "&size=8";

        fetch(url, {
            method: "GET",
            headers: {
                "Accept": "application/json"
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error("판매상품을 불러오지 못했습니다.");
            }
            return response.json();
        })
        .then(data => {
            if (!data.success) {
                alert(data.message || "판매상품을 불러오지 못했습니다.");
                return;
            }

            const productList = data.productList || [];
            hasMore = !!data.hasMore;

            if (reset && productList.length === 0) {
                sellGrid.innerHTML = `<div class="sps-empty">등록된 판매상품이 없습니다.</div>`;
            } else {
                productList.forEach(product => {
                    sellGrid.insertAdjacentHTML("beforeend", makeProductCard(product));
                });
            }

            toggleLoadMoreButton();
            currentPage++;
        })
        .catch(error => {
            console.error(error);
            alert("판매상품을 불러오는 중 오류가 발생했습니다.");
        })
        .finally(() => {
            isLoading = false;
        });
    }

    function makeProductCard(product) {
        const targetProductNo = product.productNo;
        const productName = escapeHtml(product.productName || "상품명");
        const productPrice = formatProductPrice(product.saleType, product.productPrice);
        const tradeStatus = escapeHtml(product.tradeStatus || "판매중");
        const badgeClass = getTradeStatusClass(product.tradeStatus);
        const placeName = escapeHtml(product.placeName || "위치정보 없음");
        const imgUrl = buildImageUrl(
            product.imgUrl,
            ctxBase + "/images/no_image.png"
        );
        const timeAgo = formatTimeAgo(product.regDate);
        const viewCount = product.viewCount != null ? product.viewCount : 0;
        const wished = Number(product.wished) === 1;

        return `
            <article class="sps-card">
                <a class="sps-thumb" href="${ctxBase}/product/product_detail/${targetProductNo}">
                    <span class="sps-badge ${badgeClass}">${tradeStatus}</span>
                    <button class="sps-like ${wished ? "is-active" : ""}"
                            type="button"
                            aria-label="찜"
                            aria-pressed="${wished}"
                            data-product-no="${targetProductNo}"
                            data-login="${isLogin}">
                        <i class="${wished ? "fa-solid" : "fa-regular"} fa-heart"></i>
                    </button>
                    <img src="${imgUrl}" alt="${productName}">
                </a>
                <div class="sps-body">
                    <a class="sps-title" href="${ctxBase}/product/product_detail/${targetProductNo}">${productName}</a>
                    <div class="sps-price">${productPrice}</div>
                    <div class="sps-meta">
                        <span><i class="fa-solid fa-location-dot"></i> ${placeName}</span>
                        <span><i class="fa-regular fa-clock"></i> ${timeAgo}</span>
                        <span><i class="fa-solid fa-eye"></i> ${viewCount}</span>
                    </div>
                </div>
            </article>
        `;
    }

    function formatProductPrice(saleType, price) {
        const num = Number(price || 0);

        if (saleType === "나눔" || num === 0) {
            return "무료나눔";
        }

        if (price == null || price === "") {
            return "가격없음";
        }

        return num.toLocaleString("ko-KR") + "원";
    }

    function getTradeStatusClass(tradeStatus) {
        if (tradeStatus === "판매중") return "chip-sale-ing";
        if (tradeStatus === "예약중") return "chip-sale-reserved";
        if (tradeStatus === "판매완료") return "chip-sale-done";
        return "";
    }

    function buildImageUrl(path, defaultUrl) {
        if (!path || String(path).trim() === "") {
            return defaultUrl;
        }

        path = String(path).trim();

        if (path.startsWith("http://") || path.startsWith("https://")) {
            return path;
        }

        if (path.startsWith(ctxBase + "/")) {
            return path;
        }

        if (path.startsWith("/images/") || path.startsWith("/upload/")) {
            return ctxBase + path;
        }

        if (path.startsWith("images/") || path.startsWith("upload/")) {
            return ctxBase + "/" + path;
        }

        return ctxBase + "/images/" + path;
    }

    function initSortButtons() {
        sortBtns.forEach(btn => {
            btn.addEventListener("click", function () {
                sortBtns.forEach(el => {
                    el.classList.remove("is-active");
                    el.setAttribute("aria-selected", "false");
                });

                this.classList.add("is-active");
                this.setAttribute("aria-selected", "true");

                currentSort = this.getAttribute("data-sort");
                loadSellerProducts(true);
            });
        });
    }

    function initLoadMore() {
        if (!sellLoadMoreBtn) return;

        sellLoadMoreBtn.addEventListener("click", function () {
            loadSellerProducts(false);
        });
    }

    function toggleLoadMoreButton() {
        if (!sellLoadMoreBtn) return;
        sellLoadMoreBtn.style.display = hasMore ? "inline-flex" : "none";
    }

    function initTabs() {
        tabs.forEach(tab => {
            tab.addEventListener("click", function () {
                tabs.forEach(el => {
                    el.classList.remove("is-active");
                    el.setAttribute("aria-selected", "false");
                });

                this.classList.add("is-active");
                this.setAttribute("aria-selected", "true");

                const tabName = this.getAttribute("data-tab");

                if (tabName === "sell") {
                    sellPanel.classList.add("is-show");
                    sellPanel.hidden = false;
                    reviewPanel.classList.remove("is-show");
                    reviewPanel.hidden = true;
                } else {
                    reviewPanel.classList.add("is-show");
                    reviewPanel.hidden = false;
                    sellPanel.classList.remove("is-show");
                    sellPanel.hidden = true;
                }
            });
        });
    }

    function loadSellerReviewSummary() {
        fetch(ctxBase + "/product/seller/reviews/summary?productNo=" + encodeURIComponent(productNo), {
            method: "GET",
            headers: {
                "Accept": "application/json"
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error("후기 요약 정보를 불러오지 못했습니다.");
            }
            return response.json();
        })
        .then(data => {
            if (!data.success) {
                alert(data.message || "후기 요약 정보를 불러오지 못했습니다.");
                return;
            }

            renderReviewSummary(data.summary || {});
        })
        .catch(error => {
            console.error(error);
            alert("후기 요약 정보를 불러오는 중 오류가 발생했습니다.");
        });
    }

    function loadSellerReviews(reset) {
        if (reviewLoading) return;
        if (!reviewHasMore && !reset) return;

        reviewLoading = true;

        if (reset) {
            reviewPage = 1;
            reviewHasMore = true;

            if (topReviewListEl) topReviewListEl.innerHTML = "";
            if (reviewListEl) reviewListEl.innerHTML = "";
        }

        let url = ctxBase + "/product/seller/reviews"
            + "?productNo=" + encodeURIComponent(productNo)
            + "&sortType=" + encodeURIComponent(reviewSortType)
            + "&page=" + encodeURIComponent(reviewPage)
            + "&size=5";

        if (currentReviewCategory !== "") {
            url += "&reviewCategory=" + encodeURIComponent(currentReviewCategory);
        }

        fetch(url, {
            method: "GET",
            headers: {
                "Accept": "application/json"
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error("후기 목록을 불러오지 못했습니다.");
            }
            return response.json();
        })
        .then(data => {
            if (!data.success) {
                alert(data.message || "후기 목록을 불러오지 못했습니다.");
                return;
            }

            const reviewList = data.reviewList || [];
            reviewHasMore = !!data.hasMore;

            if (reset) {
                renderTopReviews(reviewList.slice(0, 3));
                renderReviewList(reviewList);
            } else {
                appendReviewList(reviewList);
            }

            toggleReviewLoadMoreButton();
        })
        .catch(error => {
            console.error(error);
            alert("후기 목록을 불러오는 중 오류가 발생했습니다.");
        })
        .finally(() => {
            reviewLoading = false;
            reviewPage++;
        });
    }

    function renderTopReviews(reviewList) {
        if (!topReviewListEl) return;

        if (!reviewList || reviewList.length === 0) {
            topReviewListEl.innerHTML = `<div class="sps-empty">등록된 후기가 없습니다.</div>`;
            return;
        }

        let html = "";

        reviewList.forEach(review => {
            const writerProfileImg = buildImageUrl(
                review.writerProfileImg,
                ctxBase + "/images/default_profile.png"
            );

            html += `
                <article class="spx-review">
                    <div class="spx-reviewLeft">
                        <div class="spx-reviewWhoWrap" style="display:flex; align-items:center; gap:10px; margin-bottom:6px;">
                            <img src="${writerProfileImg}" alt="${escapeHtml(review.writerName || "사용자")}"
                                 style="width:36px; height:36px; border-radius:50%; object-fit:cover; border:1px solid #eee;">
                            <div class="spx-reviewWho">${escapeHtml(review.writerName || "사용자")}</div>
                        </div>
                        <div class="spx-reviewTxt">${escapeHtml(review.reviewContent || "")}</div>
                    </div>
                    <div class="spx-stars" aria-label="별점 ${Number(review.rating || 0)}점">
                        ${makeStarIcons(Number(review.rating || 0))}
                    </div>
                </article>
            `;
        });

        topReviewListEl.innerHTML = html;
    }

    function renderReviewSummary(summary) {
        if (!reviewSummaryEl) return;

        const totalCount = Number(summary.totalCount || 0);
        const avgRating = Number(summary.avgRating || 0).toFixed(1);
        const kindCount = Number(summary.kindCount || 0);
        const promiseCount = Number(summary.promiseCount || 0);
        const sameDescCount = Number(summary.sameDescCount || 0);
        const carefulCount = Number(summary.carefulCount || 0);

        const chipWrap = document.querySelector(".spx-chips");
        if (chipWrap) {
            chipWrap.innerHTML = `
                <p class="spx-chip">친절해요 <span>${kindCount}</span></p>
                <p class="spx-chip">시간 약속 잘 지켜요 <span>${promiseCount}</span></p>
                <p class="spx-chip">설명대로예요 <span>${sameDescCount}</span></p>
                <p class="spx-chip">꼼꼼해요 <span>${carefulCount}</span></p>
            `;
        }

        reviewSummaryEl.innerHTML = `
            <div class="sps-rvScore">
                <div class="sps-rvScoreBig">
                    <strong>${avgRating}</strong> <span>/ 5</span>
                </div>
                <div class="sps-rvStars" aria-label="평균 별점 ${avgRating}점">
                    ${makeStarIcons(Math.round(Number(avgRating)))}
                    <em class="sps-rvCount">후기 ${totalCount}</em>
                </div>
                <div class="sps-rvHint">전체 거래후기 기준</div>
            </div>

            <div class="sps-rvBadges" aria-label="후기 키워드 요약">
                <button class="sps-rvChip ${currentReviewCategory === "" ? "is-active" : ""}" type="button" data-category="">
                    전체 <span>${totalCount}</span>
                </button>
                <button class="sps-rvChip ${currentReviewCategory === "친절해요" ? "is-active" : ""}" type="button" data-category="친절해요">
                    친절해요 <span>${kindCount}</span>
                </button>
                <button class="sps-rvChip ${currentReviewCategory === "시간 약속 잘 지켜요" ? "is-active" : ""}" type="button" data-category="시간 약속 잘 지켜요">
                    시간 약속 잘 지켜요 <span>${promiseCount}</span>
                </button>
                <button class="sps-rvChip ${currentReviewCategory === "설명대로예요" ? "is-active" : ""}" type="button" data-category="설명대로예요">
                    설명대로예요 <span>${sameDescCount}</span>
                </button>
                <button class="sps-rvChip ${currentReviewCategory === "꼼꼼해요" ? "is-active" : ""}" type="button" data-category="꼼꼼해요">
                    꼼꼼해요 <span>${carefulCount}</span>
                </button>
            </div>
        `;
    }

    function renderReviewList(reviewList) {
        if (!reviewListEl) return;

        if (!reviewList || reviewList.length === 0) {
            reviewListEl.innerHTML = `<div class="sps-empty">등록된 후기가 없습니다.</div>`;
            return;
        }

        let html = "";

        reviewList.forEach(review => {
            html += makeReviewCard(review);
        });

        reviewListEl.innerHTML = html;
    }

    function appendReviewList(reviewList) {
        if (!reviewListEl || !reviewList) return;

        let html = "";

        reviewList.forEach(review => {
            html += makeReviewCard(review);
        });

        reviewListEl.insertAdjacentHTML("beforeend", html);
    }

    function makeReviewCard(review) {
        const writerName = escapeHtml(review.writerName || "닉네임");
        const reviewContent = escapeHtml(review.reviewContent || "");
        const oneLineCat = escapeHtml(review.oneLineCat || "");
        const productName = escapeHtml(review.productName || "상품명");
        const createdAt = formatDate(review.createdAt);
        const rating = Number(review.rating || 0);

        const writerProfileImg = buildImageUrl(
            review.writerProfileImg,
            ctxBase + "/images/default_profile.png"
        );

        let productImgHtml = "";
        const rawImgUrls = String(review.productImgUrls || "").trim();

        if (rawImgUrls !== "") {
            const imgList = rawImgUrls.split("||");

            imgList.forEach(function(imgPath, idx) {
                const safeImgUrl = buildImageUrl(imgPath, ctxBase + "/images/no_image.png");
                productImgHtml += `
                    <img src="${safeImgUrl}"
                         alt="${productName} 이미지 ${idx + 1}"
                         class="sps-rvProductImg">
                `;
            });
        }
        else {
            const fallbackImgUrl = buildImageUrl(
                review.productImgUrl,
                ctxBase + "/images/no_image.png"
            );

            productImgHtml = `
                <img src="${fallbackImgUrl}"
                     alt="${productName}"
                     class="sps-rvProductImg">
            `;
        }

        return `
            <article class="sps-rvCard">
                <div class="sps-rvTop">
                    <div class="sps-rvWho">
                        <span class="sps-rvUser">
                            <span class="sps-rvAvatar"
                                  aria-hidden="true"
                                  style="background-image:url('${writerProfileImg}'); background-size:cover; background-position:center;"></span>
                            <strong>${writerName}</strong>
                        </span>
                        <span class="sps-rvMeta">
                            <span class="sps-rvStarsSm" aria-label="별점 ${rating}점">
                                ${makeStarIcons(rating)}
                            </span>
                            <span class="sps-rvDate">
                                <i class="fa-regular fa-clock"></i> ${createdAt}
                            </span>
                        </span>
                    </div>
                    <div class="sps-rvTag">${oneLineCat}</div>
                </div>

                <div class="sps-rvProduct">
                    <i class="fa-solid fa-box"></i> 거래상품:
                    <span class="rv-product-name">${productName}</span>
                </div>

                <div class="sps-rvProductImgs">
                    ${productImgHtml}
                </div>

                <p class="sps-rvText">${reviewContent}</p>
            </article>
        `;
    }

    function initReviewSortButtons() {
        reviewSortBtns.forEach(btn => {
            btn.addEventListener("click", function () {
                reviewSortBtns.forEach(el => {
                    el.classList.remove("is-active");
                    el.setAttribute("aria-selected", "false");
                });

                this.classList.add("is-active");
                this.setAttribute("aria-selected", "true");

                const text = this.textContent.trim();

                if (text.includes("높은")) {
                    reviewSortType = "high";
                } else if (text.includes("낮은")) {
                    reviewSortType = "low";
                } else {
                    reviewSortType = "latest";
                }

                loadSellerReviews(true);
            });
        });
    }

    function initReviewLoadMore() {
        if (!reviewLoadMoreBtn) return;

        reviewLoadMoreBtn.addEventListener("click", function () {
            loadSellerReviews(false);
        });
    }

    function initReviewCategoryButtons() {
        document.addEventListener("click", function (e) {
            const chip = e.target.closest(".sps-rvChip");
            if (!chip) return;

            const chipWrap = chip.closest(".sps-rvBadges");
            if (!chipWrap) return;

            chipWrap.querySelectorAll(".sps-rvChip").forEach(btn => {
                btn.classList.remove("is-active");
            });

            chip.classList.add("is-active");

            currentReviewCategory = chip.getAttribute("data-category") || "";
            loadSellerReviews(true);
        });
    }

    function toggleReviewLoadMoreButton() {
        if (!reviewLoadMoreBtn) return;
        reviewLoadMoreBtn.style.display = reviewHasMore ? "inline-flex" : "none";
    }

    function makeStarIcons(score) {
        let html = "";

        for (let i = 1; i <= 5; i++) {
            if (i <= score) {
                html += `<i class="fa-solid fa-star"></i>`;
            } else {
                html += `<i class="fa-regular fa-star"></i>`;
            }
        }

        return html;
    }

    function formatDate(value) {
        if (!value) return "";

        const date = new Date(value);
        if (isNaN(date.getTime())) return "";

        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");

        return y + "." + m + "." + d;
    }

    function formatTimeAgo(regDate) {
        if (!regDate) return "";

        const date = new Date(regDate);
        if (isNaN(date.getTime())) return "";

        const now = new Date();
        const diffMs = now - date;
        const diffMin = Math.floor(diffMs / 60000);
        const diffHour = Math.floor(diffMs / 3600000);
        const diffDay = Math.floor(diffMs / 86400000);

        if (diffMin < 1) return "방금 전";
        if (diffMin < 60) return diffMin + "분 전";
        if (diffHour < 24) return diffHour + "시간 전";
        if (diffDay < 30) return diffDay + "일 전";

        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");
        return y + "." + m + "." + d;
    }

    function escapeHtml(str) {
        return String(str)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
    }

    function initWishlistButtons() {
        document.addEventListener("click", function (e) {
            const likeBtn = e.target.closest(".sps-like");
            if (!likeBtn) return;

            e.preventDefault();
            e.stopPropagation();

            const login = String(likeBtn.getAttribute("data-login")) === "true";
            const targetProductNo = likeBtn.getAttribute("data-product-no");

            if (!login) {
                alert("로그인이 필요합니다.");
                location.href = ctxBase + "/security/login";
                return;
            }

            if (!targetProductNo) {
                alert("상품 정보가 올바르지 않습니다.");
                return;
            }

            toggleWishlist(likeBtn, targetProductNo);
        });
    }

    function toggleWishlist(button, targetProductNo) {
        fetch(ctxBase + "/product/wishlist/toggle", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8",
                "Accept": "application/json"
            },
            body: "productNo=" + encodeURIComponent(targetProductNo)
        })
        .then(response => {
            if (!response.ok) {
                throw new Error("찜 처리 중 오류가 발생했습니다.");
            }
            return response.json();
        })
        .then(data => {
            if (!data.success) {
                alert(data.message || "찜 처리에 실패했습니다.");
                return;
            }

            const wished = !!data.wished;
            updateWishButton(button, wished);

            if (wished) {
                alert("찜 성공");
            } else {
                alert("찜 취소");
            }
        })
        .catch(error => {
            console.error(error);
            alert("찜 처리 중 오류가 발생했습니다.");
        });
    }

    function updateWishButton(button, wished) {
        const icon = button.querySelector("i");

        button.classList.toggle("is-active", wished);
        button.setAttribute("aria-pressed", wished ? "true" : "false");

        if (icon) {
            icon.className = wished ? "fa-solid fa-heart" : "fa-regular fa-heart";
        }
    }
});
</script>
</body>
</html>
