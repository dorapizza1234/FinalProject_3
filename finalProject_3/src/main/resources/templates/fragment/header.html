<div th:fragment="main_header"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

  <!-- header.html -->
  <header class="site-header">
    <!-- 상단 프로모 배너 -->
    <div class="promo-banner" role="banner">
      <div class="promo-inner">
        <p class="promo-text">
          카페 1900만 고객이 판매하는 하루 10만개의 상품을 편리하게 검색해보세요
        </p>
      </div>
    </div>

    <!-- 메인 헤더 -->
    <div class="header-main">
      <div class="header-inner">
        <!-- 로고 -->
        <a class="logo" th:href="@{/}">
           <img th:src="@{/images/logo.png}" alt="logo">
        </a>

        <!-- 우측 유틸 -->
        <nav class="util" aria-label="유틸 메뉴">

          <th:block sec:authorize="isAnonymous()">
            <a class="util-link" th:href="@{/security/login}">
              로그인/회원가입
            </a>
          </th:block>

          <th:block sec:authorize="isAuthenticated()">

            <a class="util-link" th:href="@{/security/logout}">
				로그아웃
            </a>
		  </th:block>
		  
            <span class="util-sep" aria-hidden="true">|</span>

            <a href="javascript:void(0);" onclick="toggleChatPopup()">
			  <div class="notification">
			    <button type="button" class="not-btn">
			      <i class="fa-solid fa-comment-dots"></i>
			      <span class="number">2</span>
			    </button>
			  </div>
			</a>

            <span class="util-sep" aria-hidden="true">|</span>

            <a class="util-link" th:href="@{/mypage/main}">
              <button type="button" class="not-btn">
                <i class="fa-solid fa-circle-user"></i>
              </button>
            </a>

            <span class="util-sep" aria-hidden="true">|</span>

            <a th:href="@{/notification}">
              <div class="notification">
                <button type="button" class="not-btn">
                  <i class="fas fa-bell"></i>
                  <span class="number">2</span>
                </button>

                <div class="not-box">
                  <div class="not-list">
                    <div class="not-item">
                     
                      <div class="not-text">
                        <p>알림내용</p>
                        <span>1시간 전</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </a>

        </nav>
      </div>

      <!-- 하단 네비 -->
      <div class="nav-wrap">
        <div class="nav-inner">

          <div class="topbar">
            <div class="category-trigger" id="categoryTrigger">
              <button class="btn-category" id="btnCategory" type="button"
                      aria-haspopup="true" aria-expanded="false" aria-controls="categoryPanel">
                <span class="btn-icon">☰</span>
                <span class="btn-text">카테고리</span>
              </button>

              <!-- 패널 -->
             <section class="category-panel" id="categoryPanel" role="menu">
  <div class="category-wrap">
    <aside class="category-left">
      <ul class="category-left-list" id="mainMenu">
        <li><a th:href="@{/product/product_list(categoryNo=1)}">패션</a></li>
        <li><a th:href="@{/product/product_list(categoryNo=2)}">육아</a></li>
        <li><a th:href="@{/product/product_list(categoryNo=3)}">가전</a></li>
        <li><a th:href="@{/product/product_list(categoryNo=4)}">홈·인테리어</a></li>
        <li><a th:href="@{/product/product_list(categoryNo=5)}">취미</a></li>
        <li><a th:href="@{/product/product_list(categoryNo=6)}">여행</a></li>
        <li><a th:href="@{/product/product_list(categoryNo=7)}">공구/산업용품</a></li>
        <li><a th:href="@{/product/product_list(categoryNo=8)}">디지털·전자기기</a></li>
      </ul>
    </aside>
  </div>
</section>
            </div>
          </div>

          <nav class="gnb" aria-label="주요 메뉴">
            <a th:href="@{/product/product_list}" class="gnb-link">장터</a>
            <a th:href="@{/product/price_check}" class="gnb-link">시세조회</a>
            <a th:href="@{/product/sell}" class="gnb-link">판매하기</a>
          </nav>

        </div>
      </div>
    </div>
  </header>
</div>
